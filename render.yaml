services:
  - type: web
    name: kpefk-repository
    env: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generate: true
      - key: DATABASE_URL
        fromDatabase:
          name: kpefk-db
          property: connectionString

databases:
  - name: kpefk-db
    plan: free
