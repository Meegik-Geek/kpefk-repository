services:
  - type: web
    name: kpefk-repository
    plan: free
    env: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        value: "django-insecure-kpefk-repo-repository-secret-2024"
      - key: DATABASE_URL
        fromDatabase:
          name: kpefk-db
          property: connectionString

databases:
  - name: kpefk-db
    plan: free
